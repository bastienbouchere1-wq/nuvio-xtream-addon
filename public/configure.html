<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurer IPTV Xtream</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#0f1115; color:#eee; margin:0; padding:32px 16px 80px; display:flex; justify-content:center; }
  .card { background:#1a1d24; padding:28px; border-radius:16px; max-width:520px; width:100%; box-shadow:0 8px 30px rgba(0,0,0,.4); }
  h1 { font-size:1.35rem; margin:0 0 4px; }
  p.sub { color:#9aa0ab; margin:0 0 22px; font-size:.9rem; }
  label { display:block; margin:14px 0 6px; font-size:.82rem; color:#c7cbd1; }
  input[type=text], input[type=password], input.search { width:100%; padding:10px 12px; border-radius:8px; border:1px solid #2c3038; background:#14161b; color:#fff; font-size:.95rem; }
  button { margin-top:18px; width:100%; padding:12px; border:none; border-radius:8px; background:#5b6cff; color:#fff; font-weight:600; cursor:pointer; font-size:.95rem; }
  button:hover { background:#4756e0; }
  button.secondary { background:#2c3038; }
  button.secondary:hover { background:#363b45; }
  button:disabled { opacity:.5; cursor:default; }
  .error { color:#ff6b6b; font-size:.85rem; margin-top:10px; display:none; }
  .hidden { display:none; }
  .section { margin-top:22px; border-top:1px solid #2c3038; padding-top:16px; }
  .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .section-head h3 { margin:0; font-size:1rem; }
  .small-actions button { width:auto; margin:0 0 0 8px; padding:5px 10px; font-size:.72rem; }
  .list { max-height:210px; overflow-y:auto; border:1px solid #2c3038; border-radius:8px; padding:6px; }
  .row { display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:6px; }
  .row:hover { background:#20242c; }
  .row input { width:18px; height:18px; accent-color:#5b6cff; flex:0 0 auto; }
  .row span { font-size:.88rem; }
  .count { color:#9aa0ab; font-size:.78rem; }
  .result { margin-top:22px; padding:14px; background:#14161b; border-radius:8px; word-break:break-all; font-size:.8rem; display:none; }
  .result.show { display:block; }
</style>
</head>
<body>
<div class="card">
  <h1>IPTV Xtream — Configuration</h1>
  <p class="sub">1) Tes identifiants → 2) coche uniquement les catégories que tu veux → 3) génère ton lien.</p>

  <label>Adresse du serveur (host:port)</label>
  <input type="text" id="host" placeholder="exemple.com:8080" />
  <label>Nom d'utilisateur</label>
  <input type="text" id="user" placeholder="ton identifiant" />
  <label>Mot de passe</label>
  <input type="password" id="pass" placeholder="ton mot de passe" />

  <button id="loadBtn" onclick="loadCategories()">Charger mes catégories</button>
  <p class="error" id="error"></p>

  <div id="picker" class="hidden">
    <div id="sections"></div>
    <button id="genBtn" onclick="generate()">Générer mon lien</button>
  </div>

  <div class="result" id="result">
    <div id="url"></div>
    <button class="secondary" onclick="copyUrl()">Copier le lien</button>
  </div>
</div>

<script>
let categories = { live: [], vod: [], series: [] };
const selected = { live: new Set(), vod: new Set(), series: new Set() };
const LABELS = { live: 'Chaînes (Live TV)', vod: 'Films', series: 'Séries' };
let currentUrl = '';

function creds() {
  return {
    host: document.getElementById('host').value.trim(),
    user: document.getElementById('user').value.trim(),
    pass: document.getElementById('pass').value.trim()
  };
}
function showError(msg) {
  const e = document.getElementById('error');
  e.textContent = msg; e.style.display = msg ? 'block' : 'none';
}

async function loadCategories() {
  const { host, user, pass } = creds();
  showError('');
  if (!host || !user || !pass) { showError('Remplis host, utilisateur et mot de passe.'); return; }

  const btn = document.getElementById('loadBtn');
  btn.disabled = true; btn.textContent = 'Chargement…';
  try {
    const q = `host=${encodeURIComponent(host)}&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`;
    const res = await fetch('/api/categories?' + q);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    categories = data;
    renderSections();
    document.getElementById('picker').classList.remove('hidden');
  } catch (e) {
    showError('Erreur : ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Recharger mes catégories';
  }
}

function renderSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  ['live', 'vod', 'series'].forEach((type) => {
    const cats = categories[type] || [];
    if (!cats.length) return;
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML =
      '<div class="section-head">' +
        '<h3>' + LABELS[type] + ' <span class="count" id="count-' + type + '"></span></h3>' +
        '<div class="small-actions">' +
          '<button class="secondary" onclick="selectAll(\'' + type + '\', true)">Tout</button>' +
          '<button class="secondary" onclick="selectAll(\'' + type + '\', false)">Aucun</button>' +
        '</div>' +
      '</div>' +
      '<input class="search" placeholder="Filtrer…" oninput="filterList(\'' + type + '\', this.value)" />' +
      '<div class="list" id="list-' + type + '"></div>';
    container.appendChild(sec);
    renderList(type, '');
    updateCount(type);
  });
}

function renderList(type, filter) {
  const list = document.getElementById('list-' + type);
  const f = (filter || '').toLowerCase();
  list.innerHTML = '';
  categories[type]
    .filter(c => c.name.toLowerCase().includes(f))
    .forEach((c) => {
      const row = document.createElement('label');
      row.className = 'row';
      const checked = selected[type].has(c.id) ? 'checked' : '';
      row.innerHTML = '<input type="checkbox" ' + checked + ' /><span>' + c.name + '</span>';
      row.querySelector('input').addEventListener('change', (e) => {
        if (e.target.checked) selected[type].add(c.id); else selected[type].delete(c.id);
        updateCount(type);
      });
      list.appendChild(row);
    });
}

function filterList(type, value) { renderList(type, value); }

function selectAll(type, on) {
  categories[type].forEach(c => { if (on) selected[type].add(c.id); else selected[type].delete(c.id); });
  const search = document.querySelector('#list-' + type).previousElementSibling.value;
  renderList(type, search);
  updateCount(type);
}

function updateCount(type) {
  const el = document.getElementById('count-' + type);
  if (el) el.textContent = '(' + selected[type].size + '/' + categories[type].length + ')';
}

async function generate() {
  const { host, user, pass } = creds();
  showError('');
  const total = selected.live.size + selected.vod.size + selected.series.size;
  if (total === 0) { showError('Coche au moins une catégorie.'); return; }

  const cats = {
    live: [...selected.live],
    vod: [...selected.vod],
    series: [...selected.series]
  };
  try {
    const res = await fetch('/api/generate-url', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ host, user, pass, cats })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    currentUrl = data.manifestUrl;
    document.getElementById('url').textContent = currentUrl;
    document.getElementById('result').classList.add('show');
    document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
  } catch (e) {
    showError('Erreur : ' + e.message);
  }
}

function copyUrl() {
  navigator.clipboard.writeText(currentUrl);
  alert('Lien copié ! Colle-le dans Nuvio pour installer l\'addon.');
}
</script>
</body>
</html>
